name: Prod Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-prod: # Changed name to reflect production
    runs-on: [self-hosted, prod-runner]
    steps:
      # 1. FIX: Force cleanup of the workspace to avoid permission errors
      - name: Cleanup Workspace
        run: |
          sudo rm -rf ${{ github.workspace }}/*
          sudo rm -rf ${{ github.workspace }}/.* || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to Prod via Docker Compose
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nirmal/react-app
          IMAGE_TAG: latest
        run: |
          # 1. Login
          aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          
          # 2. Hard Cleanup: Stop and Remove EVERYTHING related to this project
          # This ensures Port 8090 is completely released
          sudo ECR_REGISTRY=${{ env.ECR_REGISTRY }} ECR_REPOSITORY=${{ env.ECR_REPOSITORY }} IMAGE_TAG=${{ env.IMAGE_TAG }} \
          docker compose -f docker-compose.dev.yml down --remove-orphans || true
          
          # 3. Prune unused systems (optional but safe)
          sudo docker system prune -f

          # 4. Start fresh
          sudo ECR_REGISTRY=${{ env.ECR_REGISTRY }} ECR_REPOSITORY=${{ env.ECR_REPOSITORY }} IMAGE_TAG=${{ env.IMAGE_TAG }} \
          docker compose -f docker-compose.dev.yml up -d
